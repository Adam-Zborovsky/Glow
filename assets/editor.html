<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Glow Page Editor - Focus Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c3bed",
                        "background-light": "#f7f6f8",
                        "background-dark": "#171121",
                        "border-light": "#E2E8F0",
                        "canvas-bg": "#F1F5F9",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "heading": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        .mesh-gradient {
            background-color: #7c3bed;
            background-image: 
                radial-gradient(at 0% 0%, #7c3bed 0px, transparent 50%),
                radial-gradient(at 100% 0%, #ec4899 0px, transparent 50%),
                radial-gradient(at 100% 100%, #7c3bed 0px, transparent 50%),
                radial-gradient(at 0% 100%, #ec4899 0px, transparent 50%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .iphone-frame {
            box-shadow: 0 0 0 12px #333, 0 0 0 15px #C5B9B0, 0 30px 60px rgba(0,0,0,0.15);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 h-screen overflow-hidden flex flex-col font-display">
<!-- Top Toolbar -->
<header class="h-16 border-b border-border-light bg-white dark:bg-slate-900 flex items-center justify-between px-6 z-50">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-primary/10 rounded-lg text-slate-500 transition-colors">
<span class="material-icons-outlined">arrow_back</span>
</button>
<h1 class="heading-font text-lg font-semibold">Main Bio</h1>
</div>
<div class="flex items-center bg-slate-100 dark:bg-slate-800 p-1 rounded-lg">
<button class="p-1.5 px-3 rounded text-slate-400 hover:text-primary transition-all">
<span class="material-icons-outlined text-[20px]">smartphone</span>
</button>
<button class="p-1.5 px-3 rounded bg-white dark:bg-slate-700 shadow-sm text-primary">
<span class="material-icons-outlined text-[20px]">tablet</span>
</button>
<button class="p-1.5 px-3 rounded text-slate-400 hover:text-primary transition-all">
<span class="material-icons-outlined text-[20px]">desktop_windows</span>
</button>
</div>
<div class="flex items-center gap-3">
<button class="px-5 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 transition-all">Preview</button>
<button class="px-6 py-2 text-sm font-medium text-white bg-primary rounded-lg shadow-[0_0_20px_rgba(124,59,237,0.3)] hover:brightness-110 transition-all">Publish</button>
</div>
</header>
<div class="flex flex-1 overflow-hidden">
<!-- Left Sidebar: Blocks -->
<aside class="w-[280px] border-r border-border-light bg-white dark:bg-slate-900 flex flex-col p-6">
<div class="flex-1 overflow-y-auto custom-scrollbar">
<h3 class="heading-font text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Blocks</h3>
<div class="space-y-2">
<button class="w-full flex items-center gap-3 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all group">
<div class="w-8 h-8 rounded bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:text-primary">
<span class="material-icons-outlined text-[18px]">smart_button</span>
</div>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Link Button</span>
</button>
<button class="w-full flex items-center gap-3 p-3 rounded-lg border border-primary/20 bg-primary/5 transition-all group">
<div class="w-8 h-8 rounded bg-primary/20 flex items-center justify-center text-primary">
<span class="material-icons-outlined text-[18px]">account_circle</span>
</div>
<span class="text-sm font-medium text-slate-900 dark:text-white">Bio Block</span>
<div class="ml-auto w-1.5 h-1.5 rounded-full bg-primary"></div>
</button>
<button class="w-full flex items-center gap-3 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all group">
<div class="w-8 h-8 rounded bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:text-primary">
<span class="material-icons-outlined text-[18px]">share</span>
</div>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Social Icons</span>
</button>
<button class="w-full flex items-center gap-3 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all group">
<div class="w-8 h-8 rounded bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:text-primary">
<span class="material-icons-outlined text-[18px]">image</span>
</div>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Image</span>
</button>
<button class="w-full flex items-center gap-3 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all group">
<div class="w-8 h-8 rounded bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:text-primary">
<span class="material-icons-outlined text-[18px]">videocam</span>
</div>
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Video</span>
</button>
</div>
</div>
<div class="pt-6 mt-auto border-t border-slate-100 dark:border-slate-800 space-y-2">
<button class="w-full flex items-center gap-3 p-2 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
<span class="material-icons-outlined">palette</span>
<span class="text-sm font-medium">Theme</span>
</button>
<button class="w-full flex items-center gap-3 p-2 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
<span class="material-icons-outlined">settings</span>
<span class="text-sm font-medium">Settings</span>
</button>
</div>
</aside>
<!-- Center Canvas -->
<main class="flex-1 bg-canvas-bg dark:bg-background-dark/30 flex items-center justify-center p-12 overflow-y-auto">
<div class="iphone-frame relative w-[340px] h-[700px] bg-black rounded-[50px] overflow-hidden">
<!-- Inner Screen -->
<div class="absolute inset-0 mesh-gradient p-8 flex flex-col items-center">
<!-- Notch -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-7 bg-black rounded-b-2xl z-20"></div>
<!-- Page Content (Mobile Mock) -->
<div class="w-full mt-12 space-y-8 flex flex-col items-center">
<!-- Focused Bio Block -->
<div class="relative w-full p-4 flex flex-col items-center border-2 border-dashed border-primary bg-white/10 rounded-2xl">
<div class="w-20 h-20 rounded-full border-2 border-white/40 mb-4 overflow-hidden bg-slate-200">
<img alt="Sarah Chen profile portrait" class="w-full h-full object-cover" data-alt="Portrait of a young woman smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4eB3rrDy_tRMHqvQlvlYsQ4g_sUnyrACaJaEhvNfcQmcJxIlfSm024FTwbILQXUb7Y3H_-s1idO-w70ueJDEnKL2LupH4_unpWSY1P1QX6UcNivUyPdh79nLU033Fkx9ubnnKFhQIUOnrOi38fcO7rp8tZn5kWzgKNRTNJdjYDslY_rbl0yOIple156imKKDECgMgUOd9pdJKbcQLm7HTTCks7rZbbdBBkzOwIamUc4E0FxvtVjPti5VUHmFWM6cCfK2XWvmWbQ"/>
</div>
<h2 class="text-white text-xl font-bold">Sarah Chen</h2>
<p class="text-white/80 text-sm">Digital Artist</p>
<!-- Focus Handle -->
<div class="absolute -top-3 -right-3 bg-primary text-white p-1 rounded-full shadow-lg">
<span class="material-icons-outlined text-[14px]">edit</span>
</div>
</div>
<!-- Insert Point -->
<div class="group relative flex items-center justify-center w-full h-1">
<div class="hidden group-hover:flex absolute items-center justify-center w-8 h-8 rounded-full bg-primary text-white shadow-lg cursor-pointer transform -translate-y-1/2 mt-0.5">
<span class="material-icons-outlined text-[18px]">add</span>
</div>
</div>
<!-- Social Links -->
<div class="flex gap-4">
<div class="w-10 h-10 rounded-full glass flex items-center justify-center text-white">
<span class="material-icons-outlined text-[20px]">link</span>
</div>
<div class="w-10 h-10 rounded-full glass flex items-center justify-center text-white">
<span class="material-icons-outlined text-[20px]">camera_alt</span>
</div>
<div class="w-10 h-10 rounded-full glass flex items-center justify-center text-white">
<span class="material-icons-outlined text-[20px]">flutter_dash</span>
</div>
</div>
<!-- Link Buttons -->
<div class="w-full space-y-3">
<div class="w-full py-4 glass rounded-xl text-center text-white font-medium shadow-sm">
                                Latest Portfolio
                            </div>
<div class="w-full py-4 glass rounded-xl text-center text-white font-medium shadow-sm">
                                Digital Shop
                            </div>
<div class="w-full py-4 glass rounded-xl text-center text-white font-medium shadow-sm">
                                Commission Info
                            </div>
</div>
</div>
</div>
</div>
</main>
<!-- Right Panel: Block Settings -->
<aside class="w-[360px] border-l border-border-light bg-white dark:bg-slate-900 flex flex-col">
<div class="p-6 border-b border-border-light">
<h3 class="heading-font text-lg font-bold">Block Settings</h3>
<p class="text-sm text-slate-400 mt-1">Customize your profile appearance</p>
</div>
<div class="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">
<!-- Profile Image -->
<div class="space-y-4">
<label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Profile Picture</label>
<div class="flex items-center gap-6">
<div class="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 overflow-hidden relative group cursor-pointer">
<img alt="Current profile picture" class="w-full h-full object-cover" data-alt="Portrait of a young woman smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD94SG-AI1DIcm26zyXKhjOdPYojAfEfoCyHpHzZyWVF06vUU9viedgmCNgIIka9S3xWvqBJ4JAQhqdbFDIs9pVbK06o5KuGecubGKOQMn0z11XYrotXqFl3p4ucE28upnxyw1OIGaDIv7rzIsE78HswP9CO6k6h5jb-JZ0cOqdY-wCalILYd9QPwfC2kWjg9XH02O4Z79mYZH3NxnBoF8lZaSb3DsoRIdTIOvpiCHuyA-bEfUfbCnAmi67DEJaDWvYSwToGrpdlg"/>
<div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-icons-outlined text-white">photo_camera</span>
</div>
</div>
<div class="space-y-1">
<button class="text-sm font-semibold text-primary hover:underline">Change Image</button>
<p class="text-xs text-slate-400">JPG, PNG up to 5MB</p>
</div>
</div>
</div>
<!-- Text Fields -->
<div class="space-y-5">
<div class="space-y-2">
<label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Display Name</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="text" value="Sarah Chen"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Professional Title</label>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="text" value="Digital Artist"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Bio Text</label>
<textarea class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none" rows="3">Digital artist specializing in futuristic landscapes and neon aesthetics. Based in Neo-Tokyo.</textarea>
</div>
</div>
<!-- Alignment Control -->
<div class="space-y-4">
<label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Alignment</label>
<div class="grid grid-cols-3 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg">
<button class="p-2 flex items-center justify-center rounded hover:bg-white dark:hover:bg-slate-700 transition-all text-slate-500">
<span class="material-icons-outlined">format_align_left</span>
</button>
<button class="p-2 flex items-center justify-center rounded bg-white dark:bg-slate-700 shadow-sm text-primary">
<span class="material-icons-outlined">format_align_center</span>
</button>
<button class="p-2 flex items-center justify-center rounded hover:bg-white dark:hover:bg-slate-700 transition-all text-slate-500">
<span class="material-icons-outlined">format_align_right</span>
</button>
</div>
</div>
</div>
<!-- Danger Zone -->
<div class="p-6 border-t border-border-light bg-slate-50 dark:bg-slate-900/50">
<button class="w-full py-3 flex items-center justify-center gap-2 text-red-500 text-sm font-semibold hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-all">
<span class="material-icons-outlined text-[18px]">delete_outline</span>
                    Delete Block
                </button>
</div>
</aside>
</div>
</body></html>
