services:
  glow-db:
    image: postgres:16-alpine
    container_name: glow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: glow
    volumes:
      - glow_db_data:/var/lib/postgresql/data
    networks:
      - glow
    restart: unless-stopped

  glow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glow
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@glow-db:5432/glow?schema=public"
    depends_on:
      - glow-db
    networks:
      - glow
    restart: unless-stopped

networks:
  glow:
    name: glow

volumes:
  glow_db_data:
