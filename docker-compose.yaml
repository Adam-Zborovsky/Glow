services:
  glow-db:
    image: postgres:16-alpine
    container_name: glow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: glow
    volumes:
      - glow_db_data:/var/lib/postgresql/data
    ports:
      - "8181:5432"
    networks:
      - glow
    restart: unless-stopped

  glow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glow
    env_file:
      - .env
    environment:
      # Database connection inside Docker network
      DATABASE_URL: "postgresql://postgres:password@glow-db:5432/glow?schema=public"
    ports:
      - "80:3000"
    depends_on:
      - glow-db
    networks:
      - glow
      - adam
    restart: unless-stopped

networks:
  glow:
    name: glow
  adam:
    external: true

volumes:
  glow_db_data:
